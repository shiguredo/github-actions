name: Test Slack Notify Action

on:
  workflow_dispatch:
    inputs:
      force_failure:
        description: "意図的にジョブを失敗させる"
        required: true
        type: boolean
        default: false
      notify_mode:
        description: "通知モード"
        required: true
        type: choice
        options:
          - failure_and_fixed
          - all
          - failure_only
          - success_only
        default: "failure_and_fixed"
      slack_channel:
        description: "通知先の Slack チャネル"
        required: false
        type: string
        default: ""

permissions:
  actions: read

jobs:
  notify:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: 意図的に失敗させる
        if: inputs.force_failure == true
        run: exit 1

      - name: Slack 通知
        uses: ./.github/actions/slack-notify
        if: always()
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: ${{ inputs.slack_channel }}
          notify_mode: ${{ inputs.notify_mode }}
