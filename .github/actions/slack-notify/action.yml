name: 'Slack Notify'
description: 'Slack に通知を送信する Composite Action（Docker レス）'
inputs:
  status:
    description: 'ジョブのステータス (job.status を渡す。別ジョブの失敗・キャンセルは自動検出)'
    required: true
  slack_webhook:
    description: 'Slack Incoming Webhook URL'
    required: true
  slack_channel:
    description: 'Slack チャネル（Webhook のデフォルトを上書き）'
    required: false
    default: ''
  slack_title:
    description: 'メッセージタイトル'
    required: false
    default: ''
  slack_message:
    description: 'メッセージ本文'
    required: false
    default: ''
  slack_color:
    description: '色の手動指定（good, danger, #RRGGBB など）。指定時は自動判定を上書き'
    required: false
    default: ''
  slack_username:
    description: 'Slack に表示されるボット名'
    required: false
    default: 'GitHub Actions'
  slack_icon_emoji_success:
    description: 'Success 時のボットアバター絵文字'
    required: false
    default: ':green_circle:'
  slack_icon_emoji_failure:
    description: 'Failure 時のボットアバター絵文字'
    required: false
    default: ':red_circle:'
  slack_icon_emoji_fixed:
    description: 'Fixed 時のボットアバター絵文字'
    required: false
    default: ':large_blue_circle:'
  slack_footer:
    description: 'フッターテキスト'
    required: false
    default: 'Powered by shiguredo/github-actions'
  msg_minimal:
    description: 'true で最小フィールド表示、カンマ区切りで個別指定可 (repository,workflow,ref,event,commit)'
    required: false
    default: ''
  notify_mode:
    description: '通知モード (all: 全て, failure_and_fixed: failure と fixed のみ, failure_only: failure のみ, success_only: success のみ)'
    required: false
    default: 'failure_and_fixed'

runs:
  using: 'composite'
  steps:
    - id: notify
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_STATUS: ${{ inputs.status }}
        INPUT_SLACK_WEBHOOK: ${{ inputs.slack_webhook }}
        INPUT_SLACK_CHANNEL: ${{ inputs.slack_channel }}
        INPUT_SLACK_TITLE: ${{ inputs.slack_title }}
        INPUT_SLACK_MESSAGE: ${{ inputs.slack_message }}
        INPUT_SLACK_COLOR: ${{ inputs.slack_color }}
        INPUT_SLACK_USERNAME: ${{ inputs.slack_username }}
        INPUT_SLACK_ICON_EMOJI_SUCCESS: ${{ inputs.slack_icon_emoji_success }}
        INPUT_SLACK_ICON_EMOJI_FAILURE: ${{ inputs.slack_icon_emoji_failure }}
        INPUT_SLACK_ICON_EMOJI_FIXED: ${{ inputs.slack_icon_emoji_fixed }}
        INPUT_SLACK_FOOTER: ${{ inputs.slack_footer }}
        INPUT_MSG_MINIMAL: ${{ inputs.msg_minimal }}
        INPUT_NOTIFY_MODE: ${{ inputs.notify_mode }}
        GITHUB_WORKFLOW_NAME: ${{ github.workflow }}
        GITHUB_SERVER_URL_VAL: ${{ github.server_url }}
        GITHUB_ACTOR_VAL: ${{ github.actor }}
        GITHUB_REPOSITORY_VAL: ${{ github.repository }}
        GITHUB_REF_VAL: ${{ github.ref }}
        GITHUB_SHA_VAL: ${{ github.sha }}
        GITHUB_EVENT_NAME_VAL: ${{ github.event_name }}
        GITHUB_RUN_ID_VAL: ${{ github.run_id }}
        GITHUB_RUN_ATTEMPT_VAL: ${{ github.run_attempt }}
        GITHUB_REF_NAME_VAL: ${{ github.ref_name }}
      run: |
        set -euo pipefail

        # ステータスを小文字に正規化
        STATUS=$(echo "${INPUT_STATUS}" | tr '[:upper:]' '[:lower:]')

        # 別ジョブから呼ばれた場合、同一ワークフロー実行内の他ジョブの失敗・キャンセルを検出
        if [[ "${STATUS}" == "success" ]]; then
          JOBS_JSON=$(gh api "repos/${GITHUB_REPOSITORY_VAL}/actions/runs/${GITHUB_RUN_ID_VAL}/jobs" 2>/dev/null || echo "{}")
          FAILED_JOBS=$(echo "${JOBS_JSON}" | jq '[.jobs[] | select(.conclusion == "failure")] | length')
          CANCELLED_JOBS=$(echo "${JOBS_JSON}" | jq '[.jobs[] | select(.conclusion == "cancelled")] | length')
          if [[ "${FAILED_JOBS}" -gt 0 ]]; then
            STATUS="failure"
          elif [[ "${CANCELLED_JOBS}" -gt 0 ]]; then
            STATUS="cancelled"
          fi
        fi

        # 前回のワークフロー実行結果を取得（Fixed 判定用）
        PREV_CONCLUSION=$(gh run list \
          --workflow "${GITHUB_WORKFLOW_NAME}" \
          --branch "${GITHUB_REF_NAME_VAL}" \
          --status completed --limit 1 \
          --json conclusion -q '.[0].conclusion' 2>/dev/null || echo "unknown")

        # notify_mode に応じた送信スキップ判定
        IS_FIXED="false"
        if [[ "${STATUS}" == "success" ]] && [[ "${PREV_CONCLUSION}" == "failure" ]]; then
          IS_FIXED="true"
        fi

        # re-run の場合、前回 attempt の結果で Fixed 判定
        if [[ "${STATUS}" == "success" ]] && [[ "${IS_FIXED}" == "false" ]] && [[ "${GITHUB_RUN_ATTEMPT_VAL}" -gt 1 ]]; then
          PREV_ATTEMPT=$((GITHUB_RUN_ATTEMPT_VAL - 1))
          PREV_ATTEMPT_CONCLUSION=$(gh api \
            "repos/${GITHUB_REPOSITORY_VAL}/actions/runs/${GITHUB_RUN_ID_VAL}/attempts/${PREV_ATTEMPT}" \
            --jq '.conclusion' 2>/dev/null || echo "unknown")
          if [[ "${PREV_ATTEMPT_CONCLUSION}" == "failure" ]]; then
            IS_FIXED="true"
          fi
        fi

        case "${INPUT_NOTIFY_MODE}" in
          failure_only)
            if [[ "${STATUS}" != "failure" ]]; then
              echo "notify_mode=failure_only: ステータスが failure ではないため通知をスキップ"
              exit 0
            fi
            ;;
          failure_and_fixed)
            if [[ "${STATUS}" != "failure" ]] && [[ "${IS_FIXED}" != "true" ]]; then
              echo "notify_mode=failure_and_fixed: failure でも fixed でもないため通知をスキップ"
              exit 0
            fi
            ;;
          success_only)
            if [[ "${STATUS}" != "success" ]]; then
              echo "notify_mode=success_only: ステータスが success ではないため通知をスキップ"
              exit 0
            fi
            ;;
        esac

        # ステータス表示テキストと色の決定
        if [[ -n "${INPUT_SLACK_COLOR}" ]]; then
          COLOR="${INPUT_SLACK_COLOR}"
        else
          case "${STATUS}" in
            success)
              if [[ "${PREV_CONCLUSION}" == "failure" ]]; then
                COLOR="#2196F3"
              else
                COLOR="good"
              fi
              ;;
            failure)
              COLOR="danger"
              ;;
            *)
              COLOR="#808080"
              ;;
          esac
        fi

        # ステータス表示テキストの決定
        case "${STATUS}" in
          success)
            if [[ "${PREV_CONCLUSION}" == "failure" ]]; then
              STATUS_TEXT="Fixed"
            else
              STATUS_TEXT="Success"
            fi
            ;;
          failure)
            STATUS_TEXT="Failure"
            ;;
          cancelled)
            STATUS_TEXT="Cancelled"
            ;;
          *)
            STATUS_TEXT="${STATUS}"
            ;;
        esac

        # ステータス別アイコンの決定
        case "${STATUS_TEXT}" in
          Fixed)   ICON_EMOJI="${INPUT_SLACK_ICON_EMOJI_FIXED}" ;;
          Success) ICON_EMOJI="${INPUT_SLACK_ICON_EMOJI_SUCCESS}" ;;
          Failure) ICON_EMOJI="${INPUT_SLACK_ICON_EMOJI_FAILURE}" ;;
          *)       ICON_EMOJI="" ;;
        esac
        # コミットメッセージを GitHub API で取得
        COMMIT_MESSAGE=$(gh api "repos/${GITHUB_REPOSITORY_VAL}/commits/${GITHUB_SHA_VAL}" --jq '.commit.message | split("\n")[0]' 2>/dev/null || echo "")

        # タイトルのデフォルト値（コミットメッセージ）
        if [[ -n "${INPUT_SLACK_TITLE}" ]]; then
          TITLE="${INPUT_SLACK_TITLE}"
        else
          TITLE="${COMMIT_MESSAGE}"
        fi

        # メッセージのデフォルト値
        if [[ -n "${INPUT_SLACK_MESSAGE}" ]]; then
          MESSAGE="${INPUT_SLACK_MESSAGE}"
        else
          MESSAGE=""
        fi

        # 短縮 SHA
        COMMIT_SHA="${GITHUB_SHA_VAL:0:7}"

        # URL 構築
        ACTIONS_URL="${GITHUB_SERVER_URL_VAL}/${GITHUB_REPOSITORY_VAL}/actions/runs/${GITHUB_RUN_ID_VAL}"
        COMMIT_URL="${GITHUB_SERVER_URL_VAL}/${GITHUB_REPOSITORY_VAL}/commit/${GITHUB_SHA_VAL}"

        # フィールド構築
        REPO_URL="${GITHUB_SERVER_URL_VAL}/${GITHUB_REPOSITORY_VAL}"
        FIELD_REPOSITORY=$(jq -n '{title: "Repository", value: $v, short: true}' \
          --arg v "<${REPO_URL}|${GITHUB_REPOSITORY_VAL}>")
        FIELD_WORKFLOW=$(jq -n '{title: "Workflow", value: $v, short: true}' \
          --arg v "<${ACTIONS_URL}|${GITHUB_WORKFLOW_NAME}>")
        FIELD_REF=$(jq -n '{title: "Ref", value: $v, short: true}' --arg v "${GITHUB_REF_VAL}")
        FIELD_EVENT=$(jq -n '{title: "Event", value: $v, short: true}' --arg v "${GITHUB_EVENT_NAME_VAL}")
        FIELD_COMMIT=$(jq -n '{title: "Commit", value: $v, short: true}' \
          --arg v "<${COMMIT_URL}|${COMMIT_SHA}>")
        FIELD_STATUS=$(jq -n '{title: "Status", value: $v, short: true}' --arg v "${STATUS_TEXT}")

        # msg_minimal に応じたフィールド配列の構築
        MINIMAL="${INPUT_MSG_MINIMAL}"
        if [[ "${MINIMAL}" == "true" ]]; then
          # 最小表示: Status のみ
          FIELDS=$(jq -n --argjson status "${FIELD_STATUS}" '[$status]')
        elif [[ -n "${MINIMAL}" ]]; then
          # カンマ区切りで指定されたフィールドのみ
          FIELDS="[]"
          IFS=',' read -ra PARTS <<< "${MINIMAL}"
          for part in "${PARTS[@]}"; do
            part=$(echo "${part}" | tr -d ' ' | tr '[:upper:]' '[:lower:]')
            case "${part}" in
              ref)
                FIELDS=$(echo "${FIELDS}" | jq --argjson f "${FIELD_REF}" '. + [$f]')
                ;;
              event)
                FIELDS=$(echo "${FIELDS}" | jq --argjson f "${FIELD_EVENT}" '. + [$f]')
                ;;
              repository)
                FIELDS=$(echo "${FIELDS}" | jq --argjson f "${FIELD_REPOSITORY}" '. + [$f]')
                ;;
              workflow)
                FIELDS=$(echo "${FIELDS}" | jq --argjson f "${FIELD_WORKFLOW}" '. + [$f]')
                ;;
              commit)
                FIELDS=$(echo "${FIELDS}" | jq --argjson f "${FIELD_COMMIT}" '. + [$f]')
                ;;
            esac
          done
          # 指定フィールドに Status を追加
          FIELDS=$(echo "${FIELDS}" | jq --argjson f "${FIELD_STATUS}" '. + [$f]')
        else
          # 全フィールド表示
          FIELDS=$(jq -n \
            --argjson repository "${FIELD_REPOSITORY}" \
            --argjson workflow "${FIELD_WORKFLOW}" \
            --argjson ref "${FIELD_REF}" \
            --argjson event "${FIELD_EVENT}" \
            --argjson commit "${FIELD_COMMIT}" \
            --argjson status "${FIELD_STATUS}" \
            '[$repository, $workflow, $ref, $event, $commit, $status]')
        fi

        # ペイロード構築（jq -n で安全に JSON を生成）
        PAYLOAD=$(jq -n \
          --arg username "${INPUT_SLACK_USERNAME}" \
          --arg icon_emoji "${ICON_EMOJI}" \
          --arg color "${COLOR}" \
          --arg author_name "${GITHUB_ACTOR_VAL}" \
          --arg author_link "${GITHUB_SERVER_URL_VAL}/${GITHUB_ACTOR_VAL}" \
          --arg author_icon "${GITHUB_SERVER_URL_VAL}/${GITHUB_ACTOR_VAL}.png?size=32" \
          --arg title "${TITLE}" \
          --arg title_link "${ACTIONS_URL}" \
          --arg text "${MESSAGE}" \
          --argjson fields "${FIELDS}" \
          --arg footer "${INPUT_SLACK_FOOTER}" \
          '{
            username: $username,
            icon_emoji: $icon_emoji,
            attachments: [{
              color: $color,
              author_name: $author_name,
              author_link: $author_link,
              author_icon: $author_icon,
              title: $title,
              title_link: $title_link,
              text: $text,
              fields: $fields,
              footer: $footer
            }]
          }')

        # チャネル指定がある場合はペイロードに追加
        if [[ -n "${INPUT_SLACK_CHANNEL}" ]]; then
          PAYLOAD=$(echo "${PAYLOAD}" | jq --arg ch "${INPUT_SLACK_CHANNEL}" '. + {channel: $ch}')
        fi

        # Slack に送信
        HTTP_STATUS=$(curl -s -o /tmp/slack_response.txt -w '%{http_code}' \
          -X POST \
          -H 'Content-Type: application/json' \
          -d "${PAYLOAD}" \
          "${INPUT_SLACK_WEBHOOK}")

        if [[ "${HTTP_STATUS}" -lt 200 ]] || [[ "${HTTP_STATUS}" -ge 300 ]]; then
          RESPONSE_BODY=$(cat /tmp/slack_response.txt 2>/dev/null || echo "")
          echo "::warning::Slack 通知の送信に失敗しました (HTTP ${HTTP_STATUS}): ${RESPONSE_BODY}"
        fi
